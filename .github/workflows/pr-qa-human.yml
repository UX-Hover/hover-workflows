name: Generate PR Human QA Checklist
on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  generate:
    if: github.event.label.name == 'ready for human qa'
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout central workflows repo
        uses: actions/checkout@v4
        with:
          repository: UX-Hover/hover-workflows
          path: .hover-workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          path: .calling-repo

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
        working-directory: .hover-workflows

      - run: node scripts/generate-qa-human.js
        working-directory: .hover-workflows
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
